<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYBERPUNK STATION</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="header">
      <span class="bracket">[</span>
      CYBERPUNK_STATION
      <span class="bracket">]</span>
    </div>

    <div id="loader-screen">
      <div id="loader-box">
        <div class="loader-title">INITIALISATION SYSTÈME</div>
        <div id="loader-bar-wrap">
          <div id="loader-bar"></div>
        </div>
        <div id="loader-percent">0%</div>
        <div id="loader-status">Chargement des assets...</div>
      </div>
    </div>

    <div id="controls-hint">
      <span>🖱 Orbit</span>
      <span>⚙ Zoom</span>
      <span>⇧ Pan</span>
    </div>

    <div id="scanline"></div>
  </div>

  <!-- Canvas Three.js -->
  <canvas id="canvas"></canvas>

  <script type="module" src="main.js"></script>
</body>
</html>
